<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img"
     aria-label="Motorsport Strategy Lab mark -- an abstract lap loop with a live position marker">
  <title>Motorsport Strategy Lab</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0B0E14"/>
      <stop offset="100%" stop-color="#05070C"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="102" fill="url(#bg)"/>

  <!-- lap loop with a deliberate gap (pit entry) -->
  <path d="M 384.4 190.5 A 143 143 0 1 1 226.7 130.6" fill="none" stroke="#00D9FF" stroke-width="23" stroke-linecap="round"/>

  <!-- amber pit-window tick -->
  <line x1="185" y1="150" x2="209" y2="174" stroke="#FFB800" stroke-width="9" stroke-linecap="round"/>

  <!-- red position marker (the car) -->
  <circle cx="161" cy="216" r="27" fill="#E10600"/>
</svg>
